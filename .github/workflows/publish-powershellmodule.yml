name: Publish PowerShell Module

on:
  release:
    types: [created]

  workflow_dispatch:

jobs:
  publish-to-gallery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install PSScriptAnalyzer and Pester modules
        shell: pwsh
        run: |
          Install-PSResource -Name PSScriptAnalyzer -TrustRepository -ErrorAction Stop
          Install-PSResource -Name Pester -TrustRepository -ErrorAction Stop
      - name: Lint with PSScriptAnalyzer
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path . -Recurse -Outvariable issues
          $errors   = $issues.Where({$_.Severity -eq 'Error'})
          $warnings = $issues.Where({$_.Severity -eq 'Warning'})
          if ($errors) {
              Write-Error "There were $($errors.Count) errors and $($warnings.Count) warnings total." -ErrorAction Stop
          } else {
              Write-Output "There were $($errors.Count) errors and $($warnings.Count) warnings total."
          }
      - name: Run Pester tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path ./Tests -PassThru
          if ($result.FailedCount -gt 0) {
              Write-Error "$($result.FailedCount) Pester test(s) failed." -ErrorAction Stop
          }
      - name: Build and publish
        env:
          NUGET_KEY: ${{ secrets.NUGET_KEY }}
        shell: pwsh
        run: |
          Publish-PSResource -Path . -ApiKey $env:NUGET_KEY -Repository PSGallery -Verbose
